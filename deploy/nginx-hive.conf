# /etc/nginx/sites-available/hive
# HIVE.AI — Nginx reverse proxy + HTTPS + HIVE.WORK frontend
# Swarmly SAS · 2026

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hive-ai.tech www.hive-ai.tech;
    return 301 https://$server_name$request_uri;
}

# HTTPS — HIVE.WORK + API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hive-ai.tech www.hive-ai.tech;

    # Certificats Let's Encrypt (generes par certbot)
    ssl_certificate /etc/letsencrypt/live/hive-ai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hive-ai.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Securite headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Assets statiques du frontend (cache longue duree, servi par Nginx)
    location /assets/ {
        alias /opt/hive/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy vers Gunicorn (API + SPA fallback)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Logs
    access_log /var/log/nginx/hive-access.log;
    error_log /var/log/nginx/hive-error.log;
}
